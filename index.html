<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep the Satellite Alive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- LEFT: 3D Canvas -->
        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
        </div>

        <!-- RIGHT: Control Panel -->
        <div class="control-panel">
            <div class="panel-header">
                <h2>SATELLITE CONTROL</h2>
            </div>

            <!-- Status Section -->
            <div class="status-section">
                <div class="status-item">
                    <span class="label">Status:</span>
                    <span id="statusIndicator" class="status-value sunlight">☀️ Sunlight</span>
                </div>
                <div class="status-item">
                    <span class="label">Survival Time:</span>
                    <span id="survivalTime" class="status-value">0s</span>
                </div>
            </div>

            <!-- Battery Section -->
            <div class="battery-section">
                <div class="battery-label">
                    <span>Battery</span>
                    <span id="batteryPercent">100%</span>
                </div>
                <div class="battery-bar-container">
                    <div class="battery-bar-background">
                        <div class="battery-threshold"></div>
                        <div id="batteryBar" class="battery-bar-fill"></div>
                    </div>
                </div>
                <div class="battery-threshold-label">10% Critical</div>
            </div>

            <!-- Systems Section -->
            <div class="systems-section">
                <h3>Systems</h3>
                <div class="system-toggle">
                    <button id="commToggle" class="system-button" data-system="comms">
                        📡 Communications
                    </button>
                    <span class="system-power">-1%</span>
                </div>
                <div class="system-toggle">
                    <button id="payloadToggle" class="system-button" data-system="payload">
                        📦 Payload
                    </button>
                    <span class="system-power">-1%</span>
                </div>
                <div class="system-toggle">
                    <button id="cameraToggle" class="system-button" data-system="camera">
                        📷 Camera
                    </button>
                    <span class="system-power">-1%</span>
                </div>
            </div>

            <!-- Faults Section -->
            <div class="faults-section">
                <h3>System Status</h3>
                <div id="faultAlert" class="fault-alert hidden">
                    <div class="fault-message">
                        <span id="faultText">No faults</span>
                    </div>
                    <button id="restartButton" class="restart-button hidden">
                        🔄 Restart System
                    </button>
                </div>
            </div>

            <!-- Game Over Modal (hidden initially) -->
            <div id="gameOverModal" class="modal hidden">
                <div class="modal-content">
                    <h2>Mission Failed</h2>
                    <p>Satellite lost power.</p>
                    <div class="final-score">
                        <p>Survival Time: <span id="finalScore">0</span> seconds</p>
                        <p>Debris Hits: <span id="finalDebrisHits">0</span></p>
                    </div>
                    <div class="scoreboard-modal">
                        <h3>🏆 High Scores</h3>
                        <div id="scoreboardDisplay"></div>
                    </div>
                    <button id="restartGameButton" class="restart-game-button">
                        ↻ Restart Game
                    </button>
                    <button id="viewScoreboard" class="view-scores-button">
                        📊 View All Scores
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- DEBUG PANEL -->
    <!-- DEBUG PANEL -->
    <div id="debugPanel" style="position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.9); color: #0f0; padding: 15px; font-family: monospace; font-size: 11px; z-index: 9999; border: 2px solid #0f0; max-width: 300px; max-height: 300px; overflow-y: auto;">
        <div>🛰️ SATELLITE DEBUG LOG</div>
        <div id="debugLog" style="margin-top: 10px; line-height: 1.4;"></div>
    </div>
    
    <!-- Three.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>

    <!-- Game Scripts -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
